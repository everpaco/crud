<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CRUD - UI</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;margin:0;padding:0;background:#f6f8fa}
    header{background:#24292f;color:#fff;padding:12px 20px}
    .container{max-width:900px;margin:20px auto;padding:16px;background:#fff;border-radius:6px}
    form{display:flex;gap:8px;margin-bottom:12px}
    input,button,select{padding:8px;border:1px solid #ddd;border-radius:4px}
    .row{display:flex;gap:8px}
    .card{padding:12px;border:1px solid #eee;border-radius:6px;margin-bottom:8px}
  </style>
</head>
<body>
  <header>
    <h1>CRUD - Panel</h1>
  </header>
  <main class="container">
    <section>
      <h2>Login</h2>
      <form id="loginForm">
        <input id="email" placeholder="email" type="email" required />
        <input id="password" placeholder="password" type="password" required />
        <button>Login</button>
      </form>
      <div id="loginResult"></div>
    </section>

    <section>
      <h2>Categorías</h2>
      <form id="categoriaForm">
        <input id="catNombre" placeholder="Nombre" required />
        <input id="catDesc" placeholder="Descripcion" />
        <button>Crear Categoría</button>
      </form>
      <div id="categoriasList"></div>
    </section>

    <section>
      <h2>Muebles</h2>
      <form id="muebleForm">
        <input id="muebleNombre" placeholder="Nombre" required />
        <input id="muebleTipo" placeholder="Tipo" />
        <input id="muebleCosto" placeholder="Costo" />
        <select id="muebleCategoria"></select>
        <button>Crear Mueble</button>
      </form>
      <div id="mueblesList"></div>
    </section>
  </main>

  <script>
    const apiBase = '';
    let token = null;

    async function api(path, opts = {}){
      opts.headers = opts.headers||{};
      opts.headers['Content-Type'] = 'application/json';
      if(token) opts.headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(apiBase + path, opts);
      if(res.status===204) return null;
      return res.json();
    }

    async function refreshCategorias(){
      const cats = await api('/categorias');
      const el = document.getElementById('categoriasList');
      el.innerHTML = '';
      const sel = document.getElementById('muebleCategoria');
      sel.innerHTML = '<option value="">-- sin categoria --</option>';
      cats.forEach(c=>{
        const d = document.createElement('div'); d.className='card'; d.textContent = `${c.id} · ${c.nombre} — ${c.descripcion||''}`;
        el.appendChild(d);
        const opt = document.createElement('option'); opt.value=c.id; opt.textContent = c.nombre; sel.appendChild(opt);
      });
    }

    async function refreshMuebles(){
      const muebles = await api('/muebles');
      const el = document.getElementById('mueblesList'); el.innerHTML = '';
      muebles.forEach(m=>{
        const d = document.createElement('div'); d.className='card';
        d.innerHTML = `<strong>${m.nombre}</strong> — ${m.tipo||''} — ${m.costo||''} <br><small>Categoria: ${m.categoria?m.categoria.nombre:'-'}</small>`;
        el.appendChild(d);
      });
    }

    document.getElementById('loginForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await api('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      if(res && res.token){ token = res.token; document.getElementById('loginResult').textContent = 'Login OK'; await refreshCategorias(); await refreshMuebles(); }
      else document.getElementById('loginResult').textContent = JSON.stringify(res);
    });

    document.getElementById('categoriaForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const nombre = document.getElementById('catNombre').value;
      const descripcion = document.getElementById('catDesc').value;
      const res = await api('/categorias', { method:'POST', body: JSON.stringify({ nombre, descripcion }) });
      document.getElementById('catNombre').value=''; document.getElementById('catDesc').value='';
      await refreshCategorias();
    });

    document.getElementById('muebleForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const nombre = document.getElementById('muebleNombre').value;
      const tipo = document.getElementById('muebleTipo').value;
      const costo = document.getElementById('muebleCosto').value;
      const categoriaId = document.getElementById('muebleCategoria').value || null;
      const res = await api('/muebles', { method:'POST', body: JSON.stringify({ nombre, tipo, costo, categoriaId }) });
      document.getElementById('muebleNombre').value=''; document.getElementById('muebleTipo').value=''; document.getElementById('muebleCosto').value='';
      await refreshMuebles();
    });

    // inicial
    refreshCategorias(); refreshMuebles();
  </script>
</body>
</html>
