# Archivo de ejemplo para desplegar en Render
# Reemplaza nombres y planes según tu cuenta

services:
  - type: web
    name: crud-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npx sequelize-cli db:migrate && npm start
    envVars:
      - key: PORT
        value: "3000"

# Nota: Este archivo no crea ni configura la base de datos con credenciales seguras.
# En Render puedes crear una base de datos PostgreSQL (Managed Database) y añadir
# la variable de entorno `DATABASE_URL` en la sección de Environment of the service.
